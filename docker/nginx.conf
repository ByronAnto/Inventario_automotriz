server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip para mejor rendimiento
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript application/wasm;
    gzip_min_length 256;

    # No cachear archivos Flutter que NO tienen hash en el nombre
    location = /main.dart.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location = /flutter_service_worker.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location = /flutter_bootstrap.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location = /version.json {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Cache de archivos estáticos con hash en el nombre
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # JS/CSS con cache moderado (se invalidan al cambiar)
    location ~* \.(js|css)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Flutter web SPA - todas las rutas al index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
